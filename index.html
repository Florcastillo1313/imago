<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Ropa</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  font-weight: bold;
  margin: 5px 0;
}

button {
  background: #25D366;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #1ebe5d;
}
</style>
</head>

<body>

<header>🔥 Catálogo de Ropa 🔥</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Remera Oversize Negra</h3>
    <p class="price">$12.000</p>
    <button onclick="comprar('Remera Oversize Negra')">Comprar</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Buzo Canguro Blanco</h3>
    <p class="price">$18.000</p>
    <button onclick="comprar('Buzo Canguro Blanco')">Comprar</button>
  </div>

</div>

<script>
function comprar(producto) {
  const numero = "542920214841"; // TU NÚMERO
  const mensaje = "Hola! Quiero comprar: " + producto;
  const url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
  window.open(url, "_blank");
}
</script>

</body>
</html>
